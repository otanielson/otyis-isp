# Exemplo Nginx — proxy para Multi-Portal (standalone)
# Copie para /etc/nginx/sites-available/multi-portal e ative:
#   ln -s /etc/nginx/sites-available/multi-portal /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# Ajuste server_name e certificado SSL conforme seu domínio.

server {
    listen 80;
    server_name portal.seudominio.com.br;
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

