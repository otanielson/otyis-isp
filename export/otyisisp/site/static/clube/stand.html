<!doctype html>
<html lang="pt-br">
<head>
  <script>var __BP=(function(){var p=location.pathname.replace(/\/$/,'')||'/';var m=p.match(/^\/([a-z0-9_-]+)(?:\/|$)/i);return m?('/'+m[1]+'/'):'/';})();var _b=document.createElement('base');_b.href=__BP==='/'?'/':__BP;document.head.appendChild(_b);</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clube Multi | Cadastro Stand</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="bg-light">
  <div id="inc-header"></div>
  <main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h2 class="mb-1">🎉 Entrar no Clube Multi (Stand)</h2>
          <p class="text-muted">Cadastro rápido: você ganha pontos na hora e já recebe seu número do sorteio.</p>

          <form id="f" class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nome *</label>
              <input class="form-control" id="name" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">WhatsApp *</label>
              <input class="form-control" id="whatsapp" placeholder="(93) 9XXXX-XXXX" required />
            </div>

            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="lgpd" required>
                <label class="form-check-label" for="lgpd">Aceito a política de privacidade (LGPD) *</label>
              </div>
            </div>

            <div class="col-12 d-flex gap-2 flex-wrap">
              <button class="btn btn-primary" type="submit">Entrar e ganhar pontos</button>
              <a class="btn btn-outline-secondary" href="assinar.html">Quero assinar agora</a>
            </div>

            <div class="col-12">
              <div id="msg" class="mt-3"></div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  document.getElementById('f').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg');
    msg.innerHTML = '<div class="alert alert-info">Cadastrando...</div>';

    const payload = {
      name: document.getElementById('name').value.trim(),
      whatsapp: document.getElementById('whatsapp').value.trim(),
      welcomePoints: 200
    };

    try{
      const res = await fetch((typeof __BP !== 'undefined' ? __BP : '/') + 'api/clube/stand/signup', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data.message || 'Erro');

      msg.innerHTML = `
        <div class="alert alert-success">
          <div class="h5 mb-1">✅ Você entrou no Clube Multi!</div>
          Pontos recebidos: <strong>${data.awardedPoints}</strong><br/>
          Saldo atual: <strong>${data.pointsBalance}</strong> pts<br/>
          Seu número do sorteio: <strong>${data.entryNumber}</strong><br/>
          Campanha: <strong>${data.campaign.name}</strong>
          <hr/>
          <a class="btn btn-primary" href="assinar.html">Assinar e ganhar bônus</a>
          <a class="btn btn-outline-primary ms-2" href="clube/index.html">Ver meu saldo</a>
        </div>
      `;
      e.target.reset();
    }catch(err){
      msg.innerHTML = `<div class="alert alert-danger">Erro: ${err.message}</div>`;
    }
  });
</script>

  <div id="inc-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/site.js"></script>
  <script src="assets/js/include.js"></script>
</body>
</html>
