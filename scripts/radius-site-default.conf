# Site default — estrutura plana (gerado pelo SaaS). post-auth sql grava em radpostauth.
server default {
	namespace = radius

	listen {
		type = auth
		ipaddr = *
		port = 0
	}
	listen {
		type = acct
		ipaddr = *
		port = 0
	}

	authorize {
		preprocess
		sql
		pap
	}
	authenticate {
		Auth-Type PAP {
			sql
		}
	}
	post-auth {
		sql
	}
	accounting {
		sql
	}
}
