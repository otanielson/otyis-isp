# Nginx — modo STANDALONE (um provedor por VPS, app na 8080)
# Use este exemplo para otyisisp.otnsoft.com.br (ou seu domínio).
# NÃO use nginx-tenants.conf em standalone — um provedor = raiz /, /portal/, /admin.

server {
    server_name otyisisp.otnsoft.com.br;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/otyisisp.otnsoft.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otyisisp.otnsoft.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # NÃO incluir nginx-tenants.conf em standalone
    # include /var/www/otyis-isp/nginx-tenants.conf;

    # TK API (se precisar)
    location ^~ /tk/api/ {
        rewrite ^/tk/api/?(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /tk/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Tudo o resto: site (/), /portal/, /admin, /api → app na 8080
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    if ($host = otyisisp.otnsoft.com.br) {
        return 301 https://$host$request_uri;
    }
    server_name otyisisp.otnsoft.com.br;
    listen 80;
    return 404;
}
