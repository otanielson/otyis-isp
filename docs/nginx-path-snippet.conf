# Snippet Nginx — acesso por path
# Cole dentro do server { } do Nginx.
# IMPORTANTE: location /slug/portal/ deve vir ANTES de location /slug/.
# Se /slug/ vier primeiro, o Nginx faz match em /slug/ e o portal do cliente (/slug/portal/) fica sem acesso.

    # Tenant: ru — acesso por path (sem DNS)
    location /ru/portal/ {
        proxy_pass http://127.0.0.1:21005/portal/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ru/portal/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API do ru em /ru/api/ -> Express /api/...
    location /ru/api/ {
        rewrite ^/ru/api/?(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:21005/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ru/;
    }

    location /ru/ {
        proxy_pass http://127.0.0.1:21004/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ru/;
        # Se CSS/JS quebrarem em subpath, descomente e ajuste:
        # sub_filter_once off; sub_filter 'href="/' 'href="/ru/'; sub_filter 'src="/' 'src="/ru/';
    }
