# Coloque isso no bloco http{} (ex.: /etc/nginx/nginx.conf)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # ---------------------------
    # TENANT CU
    # ---------------------------

    # /cu/portal -> garanta barra no final
    location = /cu/portal { return 301 /cu/portal/; }

    # CU - PORTAL em /cu/portal/
    # O app espera /portal/ e /portal/dashboard — o rewrite adiciona /portal/ ao path
    location ^~ /cu/portal/ {
        rewrite ^/cu/portal/?(.*)$ /portal/$1 break;

        proxy_pass http://127.0.0.1:4002;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /cu/portal/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # CU - API do portal e dados em /cu/api/
    # Reescreve /cu/api/... -> /api/... para que o app Express atenda normalmente.
    location ^~ /cu/api/ {
        rewrite ^/cu/api/?(.*)$ /api/$1 break;

        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /cu/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # CU - SITE em /cu/
    location = /cu { return 301 /cu/; }

    location ^~ /cu/ {
        rewrite ^/cu/?(.*)$ /$1 break;

        proxy_pass http://127.0.0.1:4001;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /cu/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---------------------------
    # TENANT OTU
    # ---------------------------

    location = /otu { return 301 /otu/; }
    location = /otu/portal { return 301 /otu/portal/; }

    # OTU - PORTAL em /otu/portal/
    location ^~ /otu/portal/ {
        rewrite ^/otu/portal/?(.*)$ /portal/$1 break;

        proxy_pass http://127.0.0.1:4003;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /otu/portal/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # OTU - API em /otu/api/
    location ^~ /otu/api/ {
        rewrite ^/otu/api/?(.*)$ /api/$1 break;

        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /otu/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # OTU - SITE em /otu/
    location ^~ /otu/ {
        rewrite ^/otu/?(.*)$ /$1 break;

        proxy_pass http://127.0.0.1:4003;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /otu/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---------------------------
    # TENANT BY
    # Site e portal no mesmo container (porta 4001)
    # ---------------------------

    location = /by { return 301 /by/; }
    location = /by/portal { return 301 /by/portal/; }

    # BY - PORTAL em /by/portal/
    location ^~ /by/portal/ {
        proxy_pass http://127.0.0.1:4001/portal/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /by/portal/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # BY - API em /by/api/
    location ^~ /by/api/ {
        rewrite ^/by/api/?(.*)$ /api/$1 break;

        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /by/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # BY - SITE em /by/
    location ^~ /by/ {
        proxy_pass http://127.0.0.1:4001/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /by/;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---------------------------
    # TENANT TU (ESPAÇO PRONTO)
    # Ajuste portas quando criar:
    #   TU SITE   -> 4011
    #   TU PORTAL -> 4012
    # ---------------------------
    # location = /tu { return 301 /tu/; }
    # location = /tu/portal { return 301 /tu/portal/; }
    #
    # location ^~ /tu/portal/ {
    #     rewrite ^/tu/portal/?(.*)$ /portal/$1 break;
    #     proxy_pass http://127.0.0.1:4012;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-Prefix /tu/portal/;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection $connection_upgrade;
    # }
    #
    # location ^~ /tu/ {
    #     rewrite ^/tu/?(.*)$ /$1 break;
    #     proxy_pass http://127.0.0.1:4011;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-Prefix /tu/;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection $connection_upgrade;
    # }

    # ---------------------------
    # RAIZ: manda pro tenant padrão
    # ---------------------------
    location = / {
        return 302 /cu/;
    }

    # ---------------------------
    # Fallback: app principal
    # ---------------------------
    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
