# Acesso só por IP — sem DNS
# Provedor acessa: http://SEU_IP/slug/portal/ e http://SEU_IP/slug/ (site)
#
# 1. Defina PUBLIC_IP=SEU_IP no .env do app
# 2. Gere o arquivo de tenants: npm run nginx-tenants
# 3. Inclua este bloco no Nginx (ou use como server principal)
# 4. Se tiver SSL, adicione listen 443 ssl e certificados

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10m;

    # Multi-Portal — tenants por path (/slug/, /slug/portal/) — ANTES do location /
    # Ajuste o caminho: use o mesmo de PROVISION_APP_CONTEXT ou NGINX_TENANTS_CONF
    include /caminho/do/projeto/nginx-tenants.conf;

    # Admin SaaS e landing (raiz)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
