# Nginx — proxy para o app Multi-Portal (sem nginx-tenants)
# O app faz o roteamento interno por path: /cu/, /cu/portal/, etc.
#
# Quando o app roda em DOCKER, defina no container:
#   PROXY_BACKEND_HOST=host.docker.internal
# E ao subir: docker run --add-host=host.docker.internal:host-gateway ...
#
# Adicione este location / no server {} que atende 191.252.210.31 (ou default_server):

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

# Confirme que o app está rodando na porta 8080 (ou ajuste proxy_pass).
# Remova ou comente o include nginx-tenants.conf — não é mais necessário.
