# Exemplo completo: otyisisp.otnsoft.com.br
# Coloque o include ANTES do location / para /bibi/portal/ e /bibi/ funcionarem.

server {
    server_name otyisisp.otnsoft.com.br;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/otyisisp.otnsoft.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/otyisisp.otnsoft.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # Multi-Portal — tenants por path (/bibi/, /bibi/portal/, etc.) — ANTES do location /
    include /var/www/otyis-isp/nginx-tenants.conf;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    if ($host = otyisisp.otnsoft.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name otyisisp.otnsoft.com.br;
    listen 80;
    return 404; # managed by Certbot
}
