<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assinar | Multi Telecom</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body class="bg-light">
  <div id="inc-header"></div>
  <main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h2 class="mb-1">Assinar Plano</h2>
          <p class="text-muted">Preencha para solicitar instalação. Escolha o vencimento e já entre no Clube Multi.</p>

          <form id="formAssinatura" class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Plano *</label>
              <select class="form-select" id="plano" required>
                <option value="">Selecione...</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Tipo *</label>
              <select class="form-select" id="tipo" required>
                <option value="residencial">Residencial</option>
                <option value="empresarial">Empresarial</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Data de vencimento *</label>
              <select class="form-select" id="vencimento" required>
                <option value="">Selecione...</option>
                <option value="5">Dia 05</option>
                <option value="10">Dia 10</option>
                <option value="15">Dia 15</option>
                <option value="20">Dia 20</option>
                <option value="25">Dia 25</option>
              </select>
              <div class="form-text">Você pode alterar depois, mas aqui já facilita seu controle.</div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Nome completo *</label>
              <input class="form-control" id="nome" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">CPF (ou CNPJ) *</label>
              <input class="form-control" id="cpfCnpj" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">WhatsApp *</label>
              <input class="form-control" id="whatsapp" placeholder="(93) 9XXXX-XXXX" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">E-mail</label>
              <input class="form-control" id="email" type="email" />
            </div>

            <hr class="mt-4"/>

            <div class="col-md-4">
              <label class="form-label">CEP *</label>
              <input class="form-control" id="cep" required />
            </div>

            <div class="col-md-8">
              <label class="form-label">Rua *</label>
              <input class="form-control" id="rua" required />
            </div>

            <div class="col-md-3">
              <label class="form-label">Número *</label>
              <input class="form-control" id="numero" required />
            </div>

            <div class="col-md-5">
              <label class="form-label">Bairro *</label>
              <input class="form-control" id="bairro" required />
            </div>

            <div class="col-md-4">
              <label class="form-label">Complemento</label>
              <input class="form-control" id="complemento" />
            </div>

            <div class="col-md-6">
              <label class="form-label">Cidade *</label>
              <input class="form-control" id="cidade" value="Monte Alegre" required />
            </div>

            <div class="col-md-6">
              <label class="form-label">Ponto de referência</label>
              <input class="form-control" id="referencia" />
            </div>

            <hr class="mt-4"/>

            <div class="col-md-6">
              <label class="form-label">Melhor dia</label>
              <select class="form-select" id="melhorDia">
                <option value="">Tanto faz</option>
                <option>Segunda</option><option>Terça</option><option>Quarta</option>
                <option>Quinta</option><option>Sexta</option><option>Sábado</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Melhor horário</label>
              <select class="form-select" id="melhorHorario">
                <option value="">Tanto faz</option>
                <option value="manha">Manhã</option>
                <option value="tarde">Tarde</option>
                <option value="noite">Noite</option>
              </select>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="wifi6">
                <label class="form-check-label" for="wifi6">Quero roteador Wi‑Fi 6</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="mesh">
                <label class="form-check-label" for="mesh">Tenho interesse em Wi‑Fi Mesh (casa grande)</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="fidelidade12">
                <label class="form-check-label" for="fidelidade12">Aceito fidelidade 12 meses para ganhar bônus no Clube Multi</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="clubeMulti" checked>
                <label class="form-check-label" for="clubeMulti">Quero entrar no Clube Multi e ganhar pontos</label>
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">Observações</label>
              <textarea class="form-control" id="obs" rows="3" placeholder="Ex: casa atrás da escola, portão azul..."></textarea>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="termos" required>
                <label class="form-check-label" for="termos">Aceito os termos de contratação *</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="lgpd" required>
                <label class="form-check-label" for="lgpd">Aceito a política de privacidade (LGPD) *</label>
              </div>
            </div>

            <div class="col-12 d-flex gap-2 flex-wrap">
              <button class="btn btn-primary" type="submit">Enviar pedido</button>
              <a class="btn btn-outline-secondary" id="linkPlanos" href="/planos.html">Voltar para planos</a>
            </div>

            <div class="col-12">
              <div id="msg" class="mt-3"></div>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</main>

<script>
  (function(){
    function getBasePath() {
      var path = window.location.pathname.replace(/\/$/, '') || '/';
      var parts = path.split('/').filter(Boolean);
      if (parts.length >= 1 && !parts[0].includes('.') && !['admin','api','portal','assets'].includes(parts[0].toLowerCase())) {
        return '/' + parts[0] + '/';
      }
      return '/';
    }
    var basePath = getBasePath();
    var apiBase = (basePath !== '/' ? basePath : '') + 'api/assinaturas';
    var plansUrl = (basePath !== '/' ? basePath : '') + 'api/plans/';
    var linkPlanos = document.getElementById('linkPlanos');
    if (linkPlanos) linkPlanos.href = (basePath !== '/' ? basePath : '/') + 'planos.html';

    var planoSelect = document.getElementById("plano");
    var params = new URLSearchParams(location.search);
    var planoParam = params.get("plano");

    fetch(plansUrl).then(function(r){return r.json();}).then(function(d){
      if (d.ok && d.plans && d.plans.length) {
        planoSelect.innerHTML = '<option value="">Selecione...</option>' + d.plans.map(function(p){
          var label = (p.unit === 'Giga' ? p.speed_display + ' ' : p.speed_display + ' ') + p.unit;
          return '<option value="' + p.code + '">' + label + '</option>';
        }).join('');
      } else {
        planoSelect.innerHTML = '<option value="">Selecione...</option><option value="100">100 Mega</option><option value="300">300 Mega</option><option value="500">500 Mega</option><option value="1000">1 Giga</option>';
      }
      if (planoParam) planoSelect.value = planoParam;
    }).catch(function(){
      planoSelect.innerHTML = '<option value="">Selecione...</option><option value="100">100 Mega</option><option value="300">300 Mega</option><option value="500">500 Mega</option><option value="1000">1 Giga</option>';
      if (planoParam) planoSelect.value = planoParam;
    });

    document.getElementById("formAssinatura").addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
      plano: document.getElementById("plano").value,
      tipo: document.getElementById("tipo").value,
      vencimento: document.getElementById("vencimento").value,
      nome: document.getElementById("nome").value.trim(),
      cpfCnpj: document.getElementById("cpfCnpj").value.trim(),
      whatsapp: document.getElementById("whatsapp").value.trim(),
      email: document.getElementById("email").value.trim(),

      endereco: {
        cep: document.getElementById("cep").value.trim(),
        rua: document.getElementById("rua").value.trim(),
        numero: document.getElementById("numero").value.trim(),
        bairro: document.getElementById("bairro").value.trim(),
        complemento: document.getElementById("complemento").value.trim(),
        cidade: document.getElementById("cidade").value.trim(),
        referencia: document.getElementById("referencia").value.trim(),
      },

      disponibilidade: {
        melhorDia: document.getElementById("melhorDia").value,
        melhorHorario: document.getElementById("melhorHorario").value,
      },

      extras: {
        wifi6: document.getElementById("wifi6").checked,
        mesh: document.getElementById("mesh").checked,
        fidelidade12: document.getElementById("fidelidade12").checked,
        clubeMulti: document.getElementById("clubeMulti").checked,
      },

      obs: document.getElementById("obs").value.trim(),
    };

    const msg = document.getElementById("msg");
    msg.innerHTML = `<div class="alert alert-info">Enviando...</div>`;

    try {
      const res = await fetch(apiBase, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data?.message || "Falha ao enviar.");

      msg.innerHTML = `
        <div class="alert alert-success">
          Pedido enviado! Protocolo: <strong>${data.protocol || "gerado"}</strong><br/>
          <a class="alert-link" target="_blank" rel="noopener" href="${data.whatsappLink || "#"}">Abrir WhatsApp</a>
        </div>`;
      e.target.reset();
    } catch (err) {
      msg.innerHTML = `<div class="alert alert-danger">Erro: ${err.message}</div>`;
    }
  });
  })();
</script>

  <div id="inc-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/js/site.js"></script>
  <script src="/assets/js/include.js"></script>
</body>
</html>
