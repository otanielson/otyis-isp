<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel do dono do sistema | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="/assets/css/dashboard.css" rel="stylesheet" />
  <style>
    body { min-height: 100vh; background: var(--ant-bg); display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-card { max-width: 400px; width: 100%; background: var(--ant-bg-container); border-radius: var(--ant-radius); box-shadow: var(--ant-shadow); border: 1px solid var(--ant-border-light); overflow: hidden; }
    .login-card__header { background: #fafafa; padding: 2rem; text-align: center; border-bottom: 1px solid var(--ant-border-light); }
    .login-card__header i { font-size: 2.5rem; color: var(--ant-primary); }
    .login-card__title { font-size: 1.5rem; font-weight: 600; color: var(--ant-text); margin-top: 0.5rem; }
    .login-card__body { padding: 2rem; }
    .login-card__back { display: inline-flex; align-items: center; gap: 0.35rem; color: var(--ant-text-secondary); text-decoration: none; font-size: 0.9rem; margin-top: 1rem; }
    .login-card__back:hover { color: var(--ant-primary); }
    .login-card__body .btn-primary { background: var(--ant-primary) !important; border-color: var(--ant-primary) !important; }
    .login-card__body .btn-primary:hover { background: var(--ant-primary-hover) !important; border-color: var(--ant-primary-hover) !important; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-card__header">
      <i class="bi bi-shield-lock"></i>
      <h1 class="login-card__title">Painel do dono do sistema</h1>
      <p class="text-muted small mb-0">Acesso com a <strong>chave do dono do sistema</strong> (ADMIN_KEY no .env). Não é e-mail/senha.</p>
      <p class="text-muted small mt-1 mb-0">O <strong>Portal admin do provedor</strong> fica em <a href="/portal">/portal</a> — login com e-mail e senha do Master.</p>
    </div>
    <div class="login-card__body">
      <form id="loginForm" autocomplete="off">
        <label class="form-label fw-semibold">Chave do dono do sistema (ADMIN_KEY)</label>
        <input type="password" class="form-control form-control-lg" id="key" placeholder="Digite a chave do .env" required autocomplete="off" />
        <div id="loginError" class="alert alert-danger mt-2 py-2 d-none"></div>
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3" id="btnLogin">
          <span id="btnText">Entrar</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
      </form>
      <a href="/" class="login-card__back"><i class="bi bi-arrow-left"></i> Voltar ao site</a>
    </div>
  </div>

  <script>
    (function() {
      var KEY_STORAGE = 'multi_admin_key';

      var form = document.getElementById('loginForm');
      var keyInput = document.getElementById('key');
      var errorEl = document.getElementById('loginError');
      var btnText = document.getElementById('btnText');
      var btnSpinner = document.getElementById('btnSpinner');

      function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.remove('d-none');
      }
      function hideError() {
        errorEl.classList.add('d-none');
      }

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        hideError();
        var key = keyInput.value.trim();
        if (!key) {
          showError('Informe a chave do dono do sistema.');
          return;
        }

        btnText.classList.add('d-none');
        btnSpinner.classList.remove('d-none');
        keyInput.disabled = true;

        fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: key }),
          credentials: 'same-origin'
        })
          .then(function(res) { return res.json().then(function(d) { return { ok: res.ok, data: d }; }); })
          .then(function(r) {
            if (!r.ok) throw new Error(r.data.message || 'Chave inválida.');
            sessionStorage.setItem(KEY_STORAGE, key);
            window.location.href = '/admin/dashboard';
          })
          .catch(function(err) {
            showError(err.message || 'Erro ao validar. Verifique a chave.');
            btnText.classList.remove('d-none');
            btnSpinner.classList.add('d-none');
            keyInput.disabled = false;
          });
      });
    })();
  </script>
</body>
</html>
