<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel | Portal do Provedor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="/assets/css/dashboard.css" rel="stylesheet" />
</head>
<body class="admin-dash">
  <aside class="admin-sidebar">
    <div class="admin-sidebar__logo"><i class="bi bi-router"></i> Portal Provedor</div>
    <nav class="admin-sidebar__nav">
      <div class="admin-sidebar__section-title">Visão geral</div>
      <a href="/portal/dashboard" class="active" data-tab="overview"><i class="bi bi-grid"></i> Painel</a>

      <div class="admin-sidebar__section-title">Comercial</div>
      <a href="/portal/planos" data-tab="plans"><i class="bi bi-speedometer2"></i> Planos</a>
      <a href="/portal/dashboard" data-tab="leads"><i class="bi bi-person-lines-fill"></i> Pedidos</a>
      <a href="/portal/clientes" data-tab="customers"><i class="bi bi-people"></i> Clientes</a>
      <a href="/portal/propostas" data-tab="proposals"><i class="bi bi-file-earmark-text"></i> Propostas</a>
      <a href="/portal/contratos" data-tab="contracts"><i class="bi bi-file-earmark-check"></i> Contratos</a>

      <div class="admin-sidebar__section-title">Atendimento &amp; Clube</div>
      <a href="/portal/suporte" data-tab="tickets"><i class="bi bi-headset"></i> Suporte</a>
      <a href="/portal/clube" data-tab="clube"><i class="bi bi-stars"></i> Página Clube</a>

      <div class="admin-sidebar__section-title">Financeiro</div>
      <a href="/portal/financeiro" data-tab="finance"><i class="bi bi-currency-dollar"></i> Financeiro</a>
      <a href="/portal/fiscal" data-tab="fiscal"><i class="bi bi-receipt"></i> Fiscal</a>

      <div class="admin-sidebar__section-title">Operação &amp; Cadastro</div>
      <a href="/portal/estoque" data-tab="estoque"><i class="bi bi-boxes"></i> Estoque</a>
      <a href="/portal/sistema" data-tab="system"><i class="bi bi-gear"></i> Sistema</a>
      <a href="/portal/administracao" data-tab="provider"><i class="bi bi-building-gear"></i> Administração</a>
      <a href="/portal/grupos" data-tab="grupos"><i class="bi bi-people-fill"></i> Grupos</a>
      <a href="/portal/usuarios" data-tab="usuarios"><i class="bi bi-person-gear"></i> Usuários</a>
    </nav>
    <div class="admin-sidebar__foot">
      <a href="/" target="_blank"><i class="bi bi-box-arrow-up-right"></i> Abrir site</a>
      <a href="#" id="btnLogout" class="mt-2"><i class="bi bi-box-arrow-right"></i> Sair</a>
    </div>
  </aside>

  <div class="admin-body">
    <header class="admin-topbar">
      <h1 class="admin-topbar__title">Gerenciar Portal</h1>
      <span class="text-muted small">Portal do provedor</span>
    </header>

    <main class="admin-content">
      <!-- As abas são carregadas dinamicamente em /portal/dashboard/tabs/*.html -->
      <div id="dashboard-tab-content"></div>
      <div id="portal-page-host"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
  <script src="/assets/js/dashboard-tabs-loader.js"></script>
  <script src="/assets/js/portal-modals.js"></script>
  <script src="/assets/js/portal-page-sections.js"></script>
  <script src="/assets/js/finance-dashboard.js"></script>
  <script src="/assets/js/portal-dashboard.js"></script>
</body>
</html>
